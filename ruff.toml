# Ruff configuration for Nimzo
# https://docs.astral.sh/ruff/configuration/

line-length = 120

[lint]
select = ["E", "W", "F"]
ignore = [
    "E501",  # line too long — handled by the author
    "E402",  # module-level import not at top — arena.py uses load_dotenv() before imports
    "E741",  # ambiguous variable name (l, I, O) — used in comprehensions
]

[lint.per-file-ignores]
"tests/*" = ["F811"]  # allow redefinition of fixtures in test files
