# positions.toml — Nimzo puzzle gauntlet positions
#
# Each [[puzzle]] entry describes one tactical position.
# fen          : FEN string for the position to solve
# solution_uci : the correct (best) first move in UCI notation
# description  : human-readable label shown in the UI and results
#
# To use a custom puzzle set, copy this file and point the gauntlet at it
# via the UI or via puzzles_file = "my_puzzles.toml" in your TOML config.

# ── Mate in 1 ────────────────────────────────────────────────────────────

[[puzzle]]
fen         = "r1bqkb1r/pppp1Qpp/2n2n2/4p3/2B1P3/8/PPPP1PPP/RNB1K1NR b KQkq - 0 4"
solution_uci = "e8d8"
description  = "Legall's mate threat — king must flee"

[[puzzle]]
fen         = "6k1/5ppp/8/8/8/8/5PPP/4R1K1 w - - 0 1"
