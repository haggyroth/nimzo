<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nimzo · Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #07090c;
      --bg-panel:     #0c1018;
      --bg-card:      #111820;
      --bg-input:     #0a1120;
      --border:       #1a2535;
      --border-hi:    #2a3d55;
      --text:         #c8d8e8;
      --text-dim:     #3d5570;
      --text-mid:     #6a8aaa;
      --gold:         #c8921e;
      --gold-bright:  #e8b84a;
      --q-best:       #ffd700;
      --q-excellent:  #56c45a;
      --q-good:       #90c83a;
      --q-inaccuracy: #f0d030;
      --q-mistake:    #f09020;
      --q-blunder:    #e83030;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 46px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-panel);
    }
    .logo { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; color: var(--gold); letter-spacing: 3px; }
    .logo span { color: var(--text-dim); font-size: 10px; letter-spacing: 2px; margin-left: 10px; font-family: 'JetBrains Mono', monospace; }
    .nav-link {
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-mid); text-decoration: none;
      border: 1px solid var(--border-hi); padding: 5px 14px;
      transition: color .15s, border-color .15s;
    }
    .nav-link:hover { color: var(--gold); border-color: var(--gold); }

    /* ── Layout ── */
    .page { max-width: 1200px; margin: 0 auto; padding: 28px 24px 60px; display: flex; flex-direction: column; gap: 28px; }

    .section-title {
      font-family: 'Cinzel', serif; font-size: 11px; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase; color: var(--gold);
      padding-bottom: 10px; border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      padding: 20px 24px;
    }

    /* ── ELO chart ── */
    .elo-charts { display: flex; flex-wrap: wrap; gap: 16px; }
    .elo-chart-block { flex: 1; min-width: 200px; }
    .elo-chart-name { font-size: 10px; color: var(--text); margin-bottom: 6px; font-weight: 500; }
    .elo-chart-range { font-size: 8px; color: var(--text-dim); margin-bottom: 4px; }
    .elo-chart-svg { display: block; width: 100%; height: 60px; }

    /* ── Quality breakdown ── */
    .quality-grid { display: flex; flex-direction: column; gap: 14px; }
    .quality-row { display: flex; flex-direction: column; gap: 6px; }
    .quality-row-name { font-size: 10px; color: var(--text); font-weight: 500; }
    .quality-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .quality-bars { flex: 1; display: flex; height: 14px; gap: 1px; overflow: hidden; border-radius: 2px; }
    .quality-seg { height: 100%; transition: width .4s ease; position: relative; }
    .quality-seg[title]:hover::after {
      content: attr(title); position: absolute; bottom: 18px; left: 50%;
      transform: translateX(-50%); background: var(--bg-card);
      border: 1px solid var(--border-hi); padding: 2px 6px;
      font-size: 8px; white-space: nowrap; z-index: 10; pointer-events: none;
    }
    .quality-legend { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
    .quality-legend-item { display: flex; align-items: center; gap: 4px; font-size: 8px; color: var(--text-dim); }
    .quality-legend-swatch { width: 8px; height: 8px; border-radius: 1px; }
    .quality-meta { font-size: 9px; color: var(--text-dim); text-align: right; min-width: 100px; }

    /* ── Color stats ── */
    .color-table { width: 100%; border-collapse: collapse; font-size: 10px; }
    .color-table th { padding: 6px 10px; text-align: left; color: var(--text-dim); font-size: 8px; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--border); font-weight: 400; }
    .color-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
    .color-table tr:last-child td { border-bottom: none; }
    .color-table tr:hover td { background: var(--bg-card); }
    .ct-name   { color: var(--text); font-weight: 500; }
    .ct-white  { color: #e8d5b0; }
    .ct-black  { color: #8b9db8; }
    .ct-draws  { color: var(--text-dim); }
    .ct-rate   { color: var(--gold); }

    .color-header { display: flex; gap: 4px; align-items: center; }
    .swatch-w { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #f0f0f0; border: 1px solid #bbb; margin-right: 3px; }
    .swatch-b { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #1a1a1a; border: 1px solid #444; margin-right: 3px; }

    /* ── Head-to-head ── */
    .h2h-table { width: 100%; border-collapse: collapse; font-size: 10px; }
    .h2h-table th { padding: 6px 10px; text-align: left; color: var(--text-dim); font-size: 8px; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--border); font-weight: 400; }
    .h2h-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
    .h2h-table tr:last-child td { border-bottom: none; }
    .h2h-table tr:hover td { background: var(--bg-card); }
    .h2h-score { font-size: 11px; font-weight: 500; color: var(--text); }
    .h2h-games { color: var(--text-dim); font-size: 9px; }

    /* ── Empty state ── */
    .empty { padding: 28px; text-align: center; color: var(--text-dim); font-size: 10px; }

    /* ── Two-col layout for lower sections ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 800px) { .two-col { grid-template-columns: 1fr; } }

    /* ── Loading spinner ── */
    .loading { padding: 20px; text-align: center; color: var(--text-dim); font-size: 9px; letter-spacing: 2px; }

    /* ── Model card modal (shared with viewer.html) ── */
    #modelModal {
      display: none; position: fixed; inset: 0;
      background: rgba(7,9,12,.92); backdrop-filter: blur(12px);
      z-index: 320; align-items: center; justify-content: center;
    }
    #modelModal.show { display: flex; }
    .mc-card {
      width: 520px; max-width: 92vw; max-height: 86vh; overflow-y: auto;
      background: var(--bg-panel); border: 1px solid var(--border-hi);
      box-shadow: 0 30px 80px rgba(0,0,0,.85);
      padding: 22px 26px 24px; position: relative;
    }
    .mc-card::-webkit-scrollbar { width: 4px; }
    .mc-card::-webkit-scrollbar-thumb { background: var(--border-hi); }
    .mc-close {
      position: absolute; top: 14px; right: 16px;
      font-size: 10px; color: var(--text-mid); cursor: pointer;
      letter-spacing: 1.5px; text-transform: uppercase;
    }
    .mc-close:hover { color: var(--gold); }
    .mc-name {
      font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700;
      color: var(--text); letter-spacing: .8px; margin-bottom: 2px;
    }
    .mc-modelid {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; color: var(--text-dim); letter-spacing: .5px;
      word-break: break-all;
    }
    .mc-row {
      display: flex; gap: 22px; margin-top: 16px;
      padding: 12px 0; border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .mc-stat-label { font-size: 8px; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
    .mc-stat-value { font-family: 'Cinzel', serif; font-size: 18px; color: var(--gold); font-weight: 600; }
    .mc-stat-sub   { font-size: 9px; color: var(--text-mid); margin-top: 1px; }
    .mc-section-head {
      font-size: 9px; letter-spacing: 1.8px; text-transform: uppercase;
      color: var(--gold-bright); margin: 18px 0 10px; font-weight: 600;
    }
    .mc-trait {
      display: flex; gap: 10px; align-items: baseline;
      padding: 7px 0; border-bottom: 1px dashed var(--border);
    }
    .mc-trait:last-child { border-bottom: none; }
    .mc-trait-label {
      font-family: 'Cinzel', serif; font-size: 12px;
      color: var(--text); font-weight: 600; min-width: 130px;
    }
    .mc-trait-detail { font-size: 10px; color: var(--text-mid); flex: 1; }
    .mc-no-traits { font-size: 10px; color: var(--text-dim); font-style: italic; }
    .mc-qbar {
      display: flex; height: 6px; width: 100%;
      background: var(--bg-input); border: 1px solid var(--border); overflow: hidden;
    }
    .mc-qbar > span { display: block; height: 100%; }
    .mc-qbar .q-best       { background: #56c45a; }
    .mc-qbar .q-excellent  { background: #93c97e; }
    .mc-qbar .q-good       { background: #c8b87a; }
    .mc-qbar .q-inaccuracy { background: #d09a4a; }
    .mc-qbar .q-mistake    { background: #c46d3a; }
    .mc-qbar .q-blunder    { background: #b04a3a; }
    .mc-qbar-legend {
      display: flex; flex-wrap: wrap; gap: 10px;
      font-size: 9px; color: var(--text-mid); margin-top: 6px;
    }
    .mc-qbar-legend span::before {
      content: ''; display: inline-block; width: 7px; height: 7px;
      margin-right: 4px; vertical-align: middle;
    }
    .mc-qbar-legend .lb-best       ::before { background: #56c45a; }
    .mc-qbar-legend .lb-excellent  ::before { background: #93c97e; }
    .mc-qbar-legend .lb-good       ::before { background: #c8b87a; }
    .mc-qbar-legend .lb-inaccuracy ::before { background: #d09a4a; }
    .mc-qbar-legend .lb-mistake    ::before { background: #c46d3a; }
    .mc-qbar-legend .lb-blunder    ::before { background: #b04a3a; }
    .mc-lesson {
      padding: 6px 0; border-bottom: 1px dashed var(--border);
      font-size: 10px; color: var(--text-mid); line-height: 1.45;
    }
    .mc-lesson:last-child { border-bottom: none; }
    .mc-lesson .tag {
      display: inline-block; font-size: 8px; letter-spacing: 1.2px;
      text-transform: uppercase; padding: 1px 5px; margin-right: 7px;
      border: 1px solid currentColor; border-radius: 2px; vertical-align: 1px;
    }
    .mc-lesson .tag.improve  { color: #d09a4a; }
    .mc-lesson .tag.strength { color: #93c97e; }

    /* Clickable names hint */
    .clickable-name { cursor: pointer; transition: color .15s; }
    .clickable-name:hover { color: var(--gold-bright); }

    /* Achievement badges (shared with viewer.html) */
    .mc-badges { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px; }
    .mc-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 9px 4px 7px;
      background: var(--bg-card);
      border: 1px solid var(--border-hi);
      border-left: 3px solid var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 10px; font-weight: 600; letter-spacing: .6px;
      color: var(--text); cursor: help;
    }
    .mc-badge.badge-flawless     { border-left-color: #56c45a; }
    .mc-badge.badge-tactician    { border-left-color: #93c97e; }
    .mc-badge.badge-crusher      { border-left-color: #c46d3a; }
    .mc-badge.badge-grinder      { border-left-color: #c8921e; }
    .mc-badge.badge-comeback     { border-left-color: #b070d0; }
    .mc-badge.badge-giant_killer { border-left-color: #4b9fd5; }
    .mc-badge.badge-iron_wall    { border-left-color: #6a8aaa; }
    .mc-badge.badge-theorist     { border-left-color: #d09a4a; }
    .mc-badge .b-times {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; color: var(--gold-bright); letter-spacing: 0;
    }

    .mc-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .mc-meta-chip {
      display: inline-flex; align-items: baseline; gap: 4px;
      padding: 3px 8px;
      background: var(--bg-card); border: 1px solid var(--border);
      font-size: 9px; letter-spacing: .5px; color: var(--text-mid);
      font-family: 'JetBrains Mono', monospace;
    }
    .mc-meta-chip .k { color: var(--text-dim); text-transform: uppercase; font-size: 8px; }
    .mc-meta-chip .v { color: var(--gold-bright); font-weight: 500; }
    .mc-meta-chip a { color: inherit; text-decoration: none; border-bottom: 1px dotted; }
    .mc-meta-chip a:hover { color: var(--gold); }
  </style>
</head>
<body>

<header>
  <div class="logo">NIMZO <span>STATS</span></div>
  <a href="/" class="nav-link">← Live Board</a>
</header>

<div class="page">

  <!-- ── ELO History ── -->
  <div class="card" id="eloSection">
    <div class="section-title">ELO Trajectory</div>
    <div class="loading" id="eloLoading">loading…</div>
    <div class="elo-charts" id="eloCharts" style="display:none"></div>
  </div>

  <!-- ── Move Quality ── -->
  <div class="card" id="qualitySection">
    <div class="section-title">Move Quality Breakdown</div>
    <div class="loading" id="qualityLoading">loading…</div>
    <div class="quality-grid" id="qualityGrid" style="display:none"></div>
    <div class="quality-legend" id="qualityLegend" style="display:none">
      <div class="quality-legend-item"><div class="quality-legend-swatch" style="background:var(--q-best)"></div>Best (!!)</div>
      <div class="quality-legend-item"><div class="quality-legend-swatch" style="background:var(--q-excellent)"></div>Excellent (!)</div>
      <div class="quality-legend-item"><div class="quality-legend-swatch" style="background:var(--q-good)"></div>Good</div>
      <div class="quality-legend-item"><div class="quality-legend-swatch" style="background:var(--q-inaccuracy)"></div>Inaccuracy (?!)</div>
      <div class="quality-legend-item"><div class="quality-legend-swatch" style="background:var(--q-mistake)"></div>Mistake (?)</div>
      <div class="quality-legend-item"><div class="quality-legend-swatch" style="background:var(--q-blunder)"></div>Blunder (??)</div>
    </div>
  </div>

  <div class="two-col">
    <!-- ── Color Stats ── -->
    <div class="card" id="colorSection">
      <div class="section-title">Win Rate by Colour</div>
      <div class="loading" id="colorLoading">loading…</div>
      <table class="color-table" id="colorTable" style="display:none">
        <thead>
          <tr>
            <th>Player</th>
            <th><span class="swatch-w"></span>White W/D/L</th>
            <th><span class="swatch-b"></span>Black W/D/L</th>
            <th>White %</th>
            <th>Black %</th>
          </tr>
        </thead>
        <tbody id="colorBody"></tbody>
      </table>
    </div>

    <!-- ── Head to Head ── -->
    <div class="card" id="h2hSection">
      <div class="section-title">Head to Head</div>
      <div class="loading" id="h2hLoading">loading…</div>
      <table class="h2h-table" id="h2hTable" style="display:none">
        <thead>
          <tr>
            <th>Matchup</th>
            <th>Score</th>
            <th>Games</th>
          </tr>
        </thead>
        <tbody id="h2hBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const API = '';

// ── ELO chart ─────────────────────────────────────────────────────────────
function buildEloSvg(history, W, H) {
  if (!history || history.length < 2) return '<span style="color:var(--text-dim);font-size:9px">not enough data</span>';
  const pad = 2;
  const vals = history.map(h => h.elo_after);
  const lo = Math.min(...vals), hi = Math.max(...vals);
  const range = hi - lo || 1;
  const px = i => pad + (i / (vals.length - 1)) * (W - pad * 2);
  const py = v => H - pad - ((v - lo) / range) * (H - pad * 2);
  const pts = vals.map((v, i) => `${px(i).toFixed(1)},${py(v).toFixed(1)}`).join(' ');
  const fill = `${pts} ${(W - pad).toFixed(1)},${H} ${pad},${H}`;
  const lastElo = Math.round(vals[vals.length - 1]);
  const firstElo = Math.round(vals[0]);
  const delta = lastElo - firstElo;
  const deltaStr = delta >= 0 ? `+${delta}` : `${delta}`;
  const deltaCol = delta > 0 ? 'var(--q-good)' : delta < 0 ? 'var(--q-blunder)' : 'var(--text-dim)';
  return `
    <div class="elo-chart-range">${firstElo} → <strong style="color:var(--gold)">${lastElo}</strong> <span style="color:${deltaCol}">(${deltaStr})</span></div>
    <svg class="elo-chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <polygon points="${fill}" fill="rgba(200,146,30,.15)" stroke="none"/>
      <polyline points="${pts}" fill="none" stroke="var(--gold)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${px(vals.length-1).toFixed(1)}" cy="${py(vals[vals.length-1]).toFixed(1)}" r="2.5" fill="var(--gold-bright)"/>
    </svg>`;
}

async function loadEloCharts() {
  const lb = await fetch(`${API}/api/leaderboard`).then(r => r.json()).catch(() => []);
  if (!lb.length) {
    document.getElementById('eloLoading').textContent = 'No data yet.';
    return;
  }
  const histories = await Promise.all(
    lb.map(r => fetch(`${API}/api/elo-history/${encodeURIComponent(r.model_id)}`).then(r => r.json()).catch(() => []))
  );
  const wrap = document.getElementById('eloCharts');
  lb.forEach((r, i) => {
    const block = document.createElement('div');
    block.className = 'elo-chart-block';
    block.innerHTML = `<div class="elo-chart-name clickable-name" onclick="openModelCard('${escHtml(r.model_id).replace(/'/g,"\\'")}')" title="Show model card">${escHtml(r.name)}</div>${buildEloSvg(histories[i], 260, 60)}`;
    wrap.appendChild(block);
  });
  document.getElementById('eloLoading').style.display = 'none';
  wrap.style.display = 'flex';
}

// ── Move quality ──────────────────────────────────────────────────────────
const Q_COLS = {
  best: 'var(--q-best)', excellent: 'var(--q-excellent)', good: 'var(--q-good)',
  inaccuracy: 'var(--q-inaccuracy)', mistake: 'var(--q-mistake)', blunder: 'var(--q-blunder)',
};
const Q_ORDER = ['best', 'excellent', 'good', 'inaccuracy', 'mistake', 'blunder'];

async function loadQuality() {
  const rows = await fetch(`${API}/api/stats/moves`).then(r => r.json()).catch(() => []);
  if (!rows.length) { document.getElementById('qualityLoading').textContent = 'No data yet.'; return; }

  const grid = document.getElementById('qualityGrid');
  rows.forEach(r => {
    const total = r.total_moves || 1;
    const blunderPct = ((r.blunder / total) * 100).toFixed(1);
    const bestPct    = ((r.best    / total) * 100).toFixed(1);
    const avgRank    = r.avg_candidate_rank ? r.avg_candidate_rank.toFixed(2) : '—';

    const segs = Q_ORDER.map(q => {
      const pct = ((r[q] || 0) / total * 100).toFixed(1);
      return pct > 0
        ? `<div class="quality-seg" style="width:${pct}%;background:${Q_COLS[q]}" title="${q}: ${r[q] || 0} (${pct}%)"></div>`
        : '';
    }).join('');

    const block = document.createElement('div');
    block.className = 'quality-row';
    block.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div class="quality-row-name clickable-name" onclick="openModelCard('${escHtml(r.model_id).replace(/'/g,"\\'")}')" title="Show model card">${escHtml(r.name)}</div>
        <div class="quality-meta">${total} moves · blunder ${blunderPct}% · best ${bestPct}% · avg rank ${avgRank}</div>
      </div>
      <div class="quality-bar-wrap">
        <div class="quality-bars">${segs}</div>
      </div>`;
    grid.appendChild(block);
  });

  document.getElementById('qualityLoading').style.display = 'none';
  grid.style.display = 'flex';
  document.getElementById('qualityLegend').style.display = 'flex';
}

// ── Color stats ───────────────────────────────────────────────────────────
function winPct(wins, draws, losses) {
  const total = wins + draws + losses;
  if (!total) return '—';
  return ((wins + draws * 0.5) / total * 100).toFixed(0) + '%';
}

async function loadColorStats() {
  const rows = await fetch(`${API}/api/stats/colors`).then(r => r.json()).catch(() => []);
  if (!rows.length) { document.getElementById('colorLoading').textContent = 'No data yet.'; return; }

  const tbody = document.getElementById('colorBody');
  rows.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="ct-name clickable-name" onclick="openModelCard('${escHtml(r.model_id).replace(/'/g,"\\'")}')" title="Show model card">${escHtml(r.name)}</td>
      <td class="ct-white">${r.white_wins}/${r.white_draws}/${r.white_losses}</td>
      <td class="ct-black">${r.black_wins}/${r.black_draws}/${r.black_losses}</td>
      <td class="ct-rate">${winPct(r.white_wins, r.white_draws, r.white_losses)}</td>
      <td class="ct-rate">${winPct(r.black_wins, r.black_draws, r.black_losses)}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('colorLoading').style.display = 'none';
  document.getElementById('colorTable').style.display = 'table';
}

// ── Head to head ──────────────────────────────────────────────────────────
async function loadH2H() {
  const rows = await fetch(`${API}/api/stats/h2h`).then(r => r.json()).catch(() => []);
  if (!rows.length) { document.getElementById('h2hLoading').textContent = 'No data yet.'; return; }

  // Collapse symmetric pairs: (A vs B) and (B vs A) → one row.
  // Key on model_id pair so name collisions can't merge unrelated players.
  const seen = new Map();
  rows.forEach(r => {
    const key  = [r.white_model_id, r.black_model_id].sort().join('|');
    const flip = r.white_model_id > r.black_model_id;
    if (!seen.has(key)) {
      seen.set(key, {
        aName: flip ? r.black_name     : r.white_name,
        bName: flip ? r.white_name     : r.black_name,
        aId:   flip ? r.black_model_id : r.white_model_id,
        bId:   flip ? r.white_model_id : r.black_model_id,
        aW: 0, draws: 0, bW: 0,
      });
    }
    const e = seen.get(key);
    if (flip) { e.bW += r.white_wins; e.draws += r.draws; e.aW += r.black_wins; }
    else       { e.aW += r.white_wins; e.draws += r.draws; e.bW += r.black_wins; }
  });

  const esc = s => escHtml(s).replace(/'/g, "\\'");
  const tbody = document.getElementById('h2hBody');
  seen.forEach(e => {
    const total = e.aW + e.draws + e.bW;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <span class="clickable-name" onclick="openModelCard('${esc(e.aId)}')" title="Show model card">${escHtml(e.aName)}</span>
        <span style="color:var(--text-dim)">vs</span>
        <span class="clickable-name" onclick="openModelCard('${esc(e.bId)}')" title="Show model card">${escHtml(e.bName)}</span>
      </td>
      <td class="h2h-score">${e.aW} – ${e.draws} – ${e.bW}</td>
      <td class="h2h-games">${total}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('h2hLoading').style.display = 'none';
  document.getElementById('h2hTable').style.display = 'table';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Model card modal ──────────────────────────────────────────────────────
async function openModelCard(modelId) {
  if (!modelId) return;
  try {
    const p = await fetch(`${API}/api/models/${encodeURIComponent(modelId)}/profile`)
      .then(r => r.json());
    renderModelCard(p);
    document.getElementById('modelModal').classList.add('show');
  } catch (e) { console.error('Model card load failed:', e); }
}
function closeModelCard() { document.getElementById('modelModal').classList.remove('show'); }

function renderModelCard(p) {
  const m = p.moves || {}, c = p.color || {}, g = p.games || {};
  const total = m.total_moves || 0;
  const wGames = (c.white_wins||0) + (c.white_draws||0) + (c.white_losses||0);
  const bGames = (c.black_wins||0) + (c.black_draws||0) + (c.black_losses||0);
  const wins   = (c.white_wins||0) + (c.black_wins||0);
  const draws  = (c.white_draws||0) + (c.black_draws||0);
  const losses = (c.white_losses||0) + (c.black_losses||0);

  const qkeys = ['q_best','q_excellent','q_good','q_inaccuracy','q_mistake','q_blunder'];
  const qcls  = { q_best:'q-best', q_excellent:'q-excellent', q_good:'q-good',
                  q_inaccuracy:'q-inaccuracy', q_mistake:'q-mistake', q_blunder:'q-blunder' };
  const qSum = qkeys.reduce((s,k) => s + (m[k]||0), 0);
  const qBar = total && qSum
    ? qkeys.map(k => {
        const n = m[k] || 0;
        if (!n) return '';
        const pct = (n / qSum * 100).toFixed(2);
        return `<span class="${qcls[k]}" style="width:${pct}%" title="${k.slice(2)}: ${n}"></span>`;
      }).join('')
    : '<span style="width:100%;background:var(--border)"></span>';

  const traits = (p.traits && p.traits.length)
    ? p.traits.map(t =>
        `<div class="mc-trait">
           <span class="mc-trait-label">${escHtml(t.label)}</span>
           <span class="mc-trait-detail">${escHtml(t.detail)}</span>
         </div>`).join('')
    : `<div class="mc-no-traits">No personality signal yet — play more games.</div>`;

  const lessons = (p.recent_lessons || []).map(l => {
    const tag = l.lesson_type === 'strength' ? 'strength' : 'improve';
    return `<div class="mc-lesson"><span class="tag ${tag}">${tag}</span>${escHtml(l.lesson)}</div>`;
  }).join('') || `<div class="mc-no-traits">No lessons yet.</div>`;

  const fmtScore = (w, d, t) => t ? `${(((w + 0.5*d)/t)*100).toFixed(0)}%` : '—';

  document.getElementById('mcBody').innerHTML = `
    <div class="mc-name">${escHtml(p.name || '—')}</div>
    <div class="mc-modelid">${escHtml(p.model_id || '')} · ${escHtml(p.backend || '')}</div>
    ${renderMetadata(p.metadata)}
    <div class="mc-row">
      <div><div class="mc-stat-label">ELO</div><div class="mc-stat-value">${p.elo ?? '—'}</div></div>
      <div><div class="mc-stat-label">Record</div><div class="mc-stat-value">${wins}/${draws}/${losses}</div><div class="mc-stat-sub">${g.total_games || 0} games</div></div>
      <div><div class="mc-stat-label">As White</div><div class="mc-stat-value">${fmtScore(c.white_wins||0, c.white_draws||0, wGames)}</div><div class="mc-stat-sub">${wGames} games</div></div>
      <div><div class="mc-stat-label">As Black</div><div class="mc-stat-value">${fmtScore(c.black_wins||0, c.black_draws||0, bGames)}</div><div class="mc-stat-sub">${bGames} games</div></div>
    </div>
    <div class="mc-section-head">Move quality (${total} moves)</div>
    <div class="mc-qbar">${qBar}</div>
    <div class="mc-qbar-legend">
      <span class="lb-best">best ${m.q_best || 0}</span>
      <span class="lb-excellent">excellent ${m.q_excellent || 0}</span>
      <span class="lb-good">good ${m.q_good || 0}</span>
      <span class="lb-inaccuracy">inaccuracy ${m.q_inaccuracy || 0}</span>
      <span class="lb-mistake">mistake ${m.q_mistake || 0}</span>
      <span class="lb-blunder">blunder ${m.q_blunder || 0}</span>
    </div>
    <div class="mc-section-head">Achievements ${(p.achievements && p.achievements.length) ? '· ' + p.achievements.reduce((s,a)=>s+a.times, 0) : ''}</div>
    ${renderBadges(p.achievements)}
    <div class="mc-section-head">Personality</div>${traits}
    <div class="mc-section-head">Recent lessons</div>${lessons}`;
}

function renderBadges(achievements) {
  if (!achievements || !achievements.length) {
    return `<div class="mc-no-traits">No achievements yet — keep playing.</div>`;
  }
  return `<div class="mc-badges">` + achievements.map(a => {
    const times = a.times > 1 ? `<span class="b-times">×${a.times}</span>` : '';
    return `<span class="mc-badge badge-${a.code}" title="${escHtml(a.desc)}">${escHtml(a.label)}${times}</span>`;
  }).join('') + `</div>`;
}

function renderMetadata(meta) {
  if (!meta) return '';
  const chips = [];
  const chip = (k, v, href) => {
    const inner = href
      ? `<a href="${href}" target="_blank" rel="noopener">${escHtml(v)}</a>`
      : escHtml(v);
    chips.push(`<span class="mc-meta-chip"><span class="k">${escHtml(k)}</span><span class="v">${inner}</span></span>`);
  };
  if (meta.family)          chip('Family',  meta.family);
  if (meta.param_count) {
    const ap = meta.active_params ? ` (${meta.active_params} active)` : '';
    chip('Params',  meta.param_count + ap);
  }
  if (meta.quantization)    chip('Quant',   meta.quantization);
  if (meta.architecture)    chip('Arch',    meta.architecture);
  if (meta.context_length)  chip('Ctx',     meta.context_length.toLocaleString());
  if (meta.file_size_label) chip('Size',    meta.file_size_label);
  if (meta.license)         chip('License', meta.license);
  if (meta.hf_url)          chip('HF',      'open ↗', meta.hf_url);
  if (!chips.length) return '';
  return `<div class="mc-meta">${chips.join('')}</div>`;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('modelModal').classList.contains('show')) closeModelCard();
});

// ── Boot ──────────────────────────────────────────────────────────────────
Promise.all([loadEloCharts(), loadQuality(), loadColorStats(), loadH2H()]);
</script>

<!-- ── Model card modal ───────────────────────────────────────────────── -->
<div id="modelModal" onclick="if(event.target.id==='modelModal') closeModelCard()">
  <div class="mc-card">
    <div class="mc-close" onclick="closeModelCard()">Close ✕</div>
    <div id="mcBody"></div>
  </div>
</div>
</body>
</html>
